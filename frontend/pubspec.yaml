name: muscle_mate
description: Gemini AIを使った筋トレメニュー生成アプリ
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2   # ワークアウト履歴の永続化
  table_calendar: ^3.1.2        # カレンダーUI
  intl: ^0.19.0                 # 日付フォーマット

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
