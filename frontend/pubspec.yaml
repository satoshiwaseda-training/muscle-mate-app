name: muscle_mate
description: Gemini AIを使った筋トレメニュー生成アプリ - サトシさんの120kg達成を支援
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2   # ワークアウト履歴の永続化
  table_calendar: ^3.1.2        # カレンダーUI
  intl: ^0.19.0                 # 日付フォーマット

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#000000"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
