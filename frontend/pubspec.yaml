name: muscle_mate
description: ルールベースの筋トレメニュー生成アプリ（計画書 v5）。外部 AI は任意機能・既定オフ。
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2   # ワークアウト履歴の永続化
  table_calendar: ^3.1.2        # カレンダーUI
  intl: ^0.19.0                 # 日付フォーマット
  share_plus: ^10.1.4           # SNS 共有・画像のシェア (iOS Native Share Sheet)
  path_provider: ^2.1.5         # 共有用一時ファイルの保存先
  cross_file: ^0.3.4+2          # share_plus が要求する共通ファイル型

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/ui/home/
    - assets/ui/menu_builder/
    - assets/ui/workout_session/
    - assets/ui/result/
    - assets/ui/visualizer/
    # 論文メタデータインデックス（計画書 v5 §5.4 の限定スキーマ）
    # build_evidence_index.py で再生成。本文サマリは含めない
    - assets/evidence_index.json

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#000000"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
