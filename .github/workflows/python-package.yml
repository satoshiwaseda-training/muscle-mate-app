# Python パッケージワークフロー
# backend/ フォルダの Python コードに対してリント＋テストを実行する。
# 参考: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: ["main"]
    paths:
      - 'backend/**'
      - '.github/workflows/python-package.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'backend/**'
      - '.github/workflows/python-package.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8 (syntax errors only)
        run: |
          # ビルドを止めるのは Python の構文エラーまたは未定義名のみ。
          # スタイル違反 (max-line-length 等) は警告に留める。
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test with pytest
        run: |
          pytest tests/ -v
